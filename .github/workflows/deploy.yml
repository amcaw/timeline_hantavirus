name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx vite build
        env:
          VITE_TIMELINE_CSV_URL: ${{ secrets.TIMELINE_CSV_URL }}
          VITE_STATS_CSV_URL: ${{ secrets.STATS_CSV_URL }}
          VITE_META_CSV_URL: ${{ secrets.META_CSV_URL }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
